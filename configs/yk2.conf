log syslog all;
debug protocols all;

router id 3.3.3.3;

protocol device {
    scan time 10;
}

protocol direct {
    ipv4;
    ipv6;
    check link yes;
}

protocol kernel fib4 {
    ipv4 {
        import all;
        export all;
    };
}

protocol kernel fib6 {
    ipv6 {
        import all;
        export all;
    };
}

filter ipv4_jkt1_export
{
        if (55666, 1111) ~ bgp_community then {
        accept;
        }

        accept;
}

template bgp tmpl_peer_ipv6
{
        # Example Local ASN
        local as 55666;
        rr client;
        ipv4
        {
                # Export and import them all, one will want to filter this normally ;)
                export all;
                import all;

                # Use the IPv6-LL address as a nexthop
                next hop self;

                # Enable the ability to have IPv6 NLRI over IPv4
                # (thus IPv6 Nexthop for a IPv4 path)
                extended next hop on;
        };

        ipv6
        {
                export all;
                import all;

                next hop self;
                extended next hop on;
        };
};

protocol bgp dr1 from tmpl_peer_ipv6 {
        # Little Description of this peer
        description "DR1";
        direct;
        # Local IPv6-LL address, needs to be configured
        source address 2401:1700:1:5::3;

        # Friendly party IPv6-LL + ASN
        neighbor 2401:1700:1:5::2 as 55666;

        # Interface this peering happens on
        interface "eth1";
}
protocol bgp jkt1 from tmpl_peer_ipv6 {
        # Little Description of this peer
        description "JKT1";
        direct;
        # Local IPv6-LL address, needs to be configured
        source address 2401:1700:1:2::3;

        # Friendly party IPv6-LL + ASN
        neighbor 2401:1700:1:2::2 as 55666;

        # Interface this peering happens on
        interface "eth2";
}
protocol bgp yk1 from tmpl_peer_ipv6 {
        # Little Description of this peer
        description "YK1";
        direct;
        # Local IPv6-LL address, needs to be configured
        source address 2401:1700:1:7::3;

        # Friendly party IPv6-LL + ASN
        neighbor 2401:1700:1:7::2 as 55666;

        # Interface this peering happens on
        interface "eth3";
}
protocol bgp yk3 from tmpl_peer_ipv6 {
        # Little Description of this peer
        description "YK3";
        direct;
        # Local IPv6-LL address, needs to be configured
        source address 2401:1700:1:9::2;

        # Friendly party IPv6-LL + ASN
        neighbor 2401:1700:1:9::3 as 55666;

        # Interface this peering happens on
        interface "eth4";
}
